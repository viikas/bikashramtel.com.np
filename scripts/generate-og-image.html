<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OG Image Generator — Screenshot this at 1200x630</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #090808;
    font-family: 'Syne', system-ui, sans-serif;
    position: relative;
  }

  /* Background effects */
  .backdrop {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(232, 160, 77, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(77, 232, 196, 0.05) 0%, transparent 50%),
      #090808;
  }

  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(232, 160, 77, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232, 160, 77, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px
    );
  }

  /* Content */
  .content {
    position: relative;
    z-index: 2;
    padding: 80px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: rgba(77, 232, 196, 0.06);
    border: 1px solid rgba(77, 232, 196, 0.15);
    border-radius: 2px;
    margin-bottom: 28px;
    width: fit-content;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4de8c4;
    box-shadow: 0 0 10px #4de8c4;
  }

  .status-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: #4de8c4;
  }

  .name {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 82px;
    font-weight: 900;
    letter-spacing: -3px;
    color: #f0ece4;
    line-height: 1;
    margin-bottom: 16px;
  }

  .identities {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 30px;
    font-weight: 700;
    font-style: italic;
    line-height: 1.4;
    margin-bottom: 32px;
  }

  .identities span:nth-child(1) { color: #e8a04d; }
  .identities span:nth-child(2) { color: #4de8c4; }
  .identities span:nth-child(3) { color: #e85d40; }
  .identities span:nth-child(4) { color: #e8a04d; }
  .identities span:nth-child(5) { color: #4de8c4; }
  .identities span:nth-child(6) { color: #e85d40; }

  .sep { color: #4a4440; font-style: normal; }

  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.08em;
    color: #7a736a;
  }

  .url strong {
    color: #e8a04d;
    font-weight: 600;
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    border-color: #4a4440;
    border-style: solid;
    z-index: 3;
  }

  .corner-tl { top: 40px; left: 40px; border-width: 1px 0 0 1px; }
  .corner-br { bottom: 40px; right: 40px; border-width: 0 1px 1px 0; }

  /* Bottom accent */
  .accent-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, #e8a04d, #4de8c4, #e85d40);
    z-index: 3;
  }

  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,900;1,9..144,700&family=Syne:wght@700&family=JetBrains+Mono:wght@500;600&display=swap');
</style>
</head>
<body>
  <div class="backdrop"></div>
  <div class="grid"></div>
  <div class="scanlines"></div>

  <div class="content">
    <div class="status">
      <div class="status-dot"></div>
      <span class="status-text">BIKASHRAMTEL.COM.NP</span>
    </div>
    <h1 class="name">Bikash Ramtel</h1>
    <div class="identities">
      <span>Gamer</span> <span class="sep">·</span>
      <span>Otaku</span> <span class="sep">·</span>
      <span>Tinkerer</span><br>
      <span>Cinephile</span> <span class="sep">·</span>
      <span>Painter</span> <span class="sep">·</span>
      <span>Developer</span>
    </div>
    <p class="url">Also writes code for a living — <strong>12+ years</strong> and counting.</p>
  </div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-br"></div>
  <div class="accent-bar"></div>
</body>
</html>
